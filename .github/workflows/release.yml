name: Release

on:
  push:
    tags:
      - "*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  validate-tag:
    runs-on: ubuntu-latest
    outputs:
      release_tag: ${{ steps.validate.outputs.release_tag }}
      prerelease: ${{ steps.validate.outputs.prerelease }}
    steps:
      - name: Validate release tag
        id: validate
        shell: bash
        run: |
          set -euo pipefail
          release_tag="${GITHUB_REF_NAME}"
          release_regex='^[0-9]{4}-[0-9]{2}-[0-9]{2}\.[0-9]+(-?beta[0-9]+)?$'

          if [[ -z "${release_tag}" ]]; then
            echo "Release workflow requires a tag reference." >&2
            exit 1
          fi

          if [[ ! "${release_tag}" =~ ${release_regex} ]]; then
            echo "Invalid release tag '${release_tag}'. Expected YYYY-MM-DD.N or YYYY-MM-DD.N-betaX." >&2
            exit 1
          fi

          prerelease=false
          if [[ "${release_tag}" =~ beta[0-9]+$ ]]; then
            prerelease=true
          fi

          echo "release_tag=${release_tag}" >> "${GITHUB_OUTPUT}"
          echo "prerelease=${prerelease}" >> "${GITHUB_OUTPUT}"

  build:
    needs: validate-tag
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            artifact_name: beaverki-linux-x86_64
            platform_id: linux-x86_64
          - os: macos-14
            artifact_name: beaverki-macos-arm64
            platform_id: macos-arm64

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Build release binaries
        run: cargo build --locked --release -p beaverki-cli -p beaverki-web

      - name: Package release archive
        shell: bash
        run: |
          set -euo pipefail
          archive_name="$(bash packaging/build-release-archive.sh "${{ needs.validate-tag.outputs.release_tag }}" "${{ matrix.platform_id }}")"
          echo "ARCHIVE_NAME=${archive_name}" >> "${GITHUB_ENV}"

      - name: Upload packaged artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: ${{ env.ARCHIVE_NAME }}
          if-no-files-found: error

  publish:
    needs:
      - validate-tag
      - build
    runs-on: ubuntu-latest
    steps:
      - name: Download packaged artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-artifacts
          merge-multiple: true

      - name: Generate checksums
        shell: bash
        run: |
          set -euo pipefail
          cd release-artifacts
          sha256sum * > SHA256SUMS.txt

      - name: Create GitHub release and upload assets
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.validate-tag.outputs.release_tag }}
          name: ${{ needs.validate-tag.outputs.release_tag }}
          prerelease: ${{ needs.validate-tag.outputs.prerelease == 'true' }}
          generate_release_notes: true
          fail_on_unmatched_files: true
          files: |
            release-artifacts/*
