tools:
  - tool_id: notion_workspace_search
    kind: lua
    description: Search the configured Notion workspace for pages or data sources related to a query.
    source_path: notion_workspace_search.lua
    input_schema:
      type: object
      properties:
        query:
          type: string
        object_kind:
          type: [string, "null"]
          enum: [page, data_source, null]
        page_size:
          type: [integer, "null"]
          minimum: 1
          maximum: 100
      required: [query, object_kind, page_size]
      additionalProperties: false
    output_schema:
      type: object
      additionalProperties: true
    capability_profile:
      allowed_tools: [notion_search]
  - tool_id: notion_read_entry
    kind: lua
    description: Fetch a Notion page or data source by ID or URL, with optional page content included.
    source_path: notion_read_entry.lua
    input_schema:
      type: object
      properties:
        ref:
          type: string
        object_kind:
          type: [string, "null"]
          enum: [page, data_source, null]
        include_content:
          type: [boolean, "null"]
        page_size:
          type: [integer, "null"]
          minimum: 1
          maximum: 100
      required: [ref, object_kind, include_content, page_size]
      additionalProperties: false
    output_schema:
      type: object
      additionalProperties: true
    capability_profile:
      allowed_tools: [notion_fetch]
  - tool_id: notion_capture_note
    kind: lua
    description: >
      Create a new Notion page under a parent page or data source.
      If parent_kind and parent_ref are null or empty, BeaverKi uses the configured Notion default parent.
      For data source parents, properties_json can provide explicit structured properties as a JSON object keyed by Notion property name.
      Supported property values include title/rich_text strings or arrays, select/status strings or name/id objects,
      multi-select arrays, checkbox booleans, numbers, date strings or objects, relation/people ID arrays,
      and url/email/phone strings. Unsupported or mismatched schema properties fail before page creation.
      Set template_type to default or template_id to apply a Notion template. Template creation cannot be combined with content blocks.
      The content field accepts Markdown-like syntax converted into native Notion blocks.
      Block types: headings (# / ## / ###), bullet lists (- or *), numbered lists (1. 2. …),
      to-do items (- [ ] / - [x]), blockquotes (>), fenced code blocks (```lang … ```),
      horizontal dividers (---).
      Nesting: indent a line by 2 spaces (or a tab) to make it a child of the preceding
      list item, quote, or paragraph — use this for sub-bullets under numbered items.
      A blank line resets the nesting context.
      Inline: **bold**, *italic*, `code`, ~~strikethrough~~, ***bold italic***,
      [link text](url), {color:text} / {color_background:text}.
    source_path: notion_capture_note.lua
    input_schema:
      type: object
      properties:
        parent_kind:
          type: [string, "null"]
          enum: [page, data_source, null]
        parent_ref:
          type: [string, "null"]
        title:
          type: string
        content:
          type: [string, "null"]
          description: >
            Markdown-formatted page body.
            Block types: headings (# H1, ## H2, ### H3), bullet list (- item or * item),
            numbered list (1. item), to-do (- [ ] unchecked, - [x] checked),
            blockquote (> text), fenced code block (```lang … ```), divider (---).
            Nesting: indent by 2 spaces or a tab to nest a block under the previous list item,
            quote, or paragraph. Multiple consecutive indented lines go under the same parent.
            Blank line resets nesting.
            Inline: **bold**, *italic*, `code`, ~~strikethrough~~, ***bold italic***,
            [link text](url), {color:text} (colors: gray, red, blue, green, yellow, orange,
            pink, purple, brown, default, or any with _background suffix).
        properties_json:
          type: [string, "null"]
          description: >
            JSON object keyed by Notion property name for data_source parents.
            Values are normalized against the data source schema.
        template_type:
          type: [string, "null"]
          enum: [none, default, template_id, null]
        template_ref:
          type: [string, "null"]
          description: Notion template ID or URL when template_type is template_id.
        template_timezone:
          type: [string, "null"]
          description: Optional IANA timezone for Notion template evaluation.
      required: [parent_kind, parent_ref, title, content, properties_json, template_type, template_ref, template_timezone]
      additionalProperties: false
    output_schema:
      type: object
      additionalProperties: true
    capability_profile:
      allowed_tools: [notion_create_page]
  - tool_id: notion_update_entry
    kind: lua
    description: >
      Update properties on an existing Notion page.
      Pass a JSON-encoded `properties_json` object whose keys are property names.
      Supported property types follow BeaverKi's built-in Notion update normalization.
    source_path: notion_update_page.lua
    input_schema:
      type: object
      properties:
        ref:
          type: string
        properties_json:
          type: string
      required: [ref, properties_json]
      additionalProperties: false
    output_schema:
      type: object
      additionalProperties: true
    capability_profile:
      allowed_tools: [notion_update_page]
  - tool_id: notion_append_content
    kind: lua
    description: >
      Append Markdown-like content blocks to an existing Notion page or block.
      Supports the same Markdown block conversion as notion_capture_note.
    source_path: notion_append_content.lua
    input_schema:
      type: object
      properties:
        parent_ref:
          type: string
        content:
          type: string
        position:
          type: [string, "null"]
          enum: [start, end, after_block, null]
        after_block_ref:
          type: [string, "null"]
      required: [parent_ref, content, position, after_block_ref]
      additionalProperties: false
    output_schema:
      type: object
      additionalProperties: true
    capability_profile:
      allowed_tools: [notion_append_block_children]
  - tool_id: notion_delete_blocks
    kind: lua
    description: >
      Delete one or more existing Notion page content blocks by ID or URL.
      Always use notion_read_entry first to inspect the current page content.blocks, then pass only
      block IDs from that latest read that should be removed.
      Deleted blocks are moved to Notion trash and can be restored from Notion.
      Duplicate, missing, or already-deleted block IDs are skipped idempotently.
    source_path: notion_delete_blocks.lua
    input_schema:
      type: object
      properties:
        block_refs:
          type: array
          items:
            type: string
          minItems: 1
          maxItems: 100
      required: [block_refs]
      additionalProperties: false
    output_schema:
      type: object
      additionalProperties: true
    capability_profile:
      allowed_tools: [notion_delete_block]
  - tool_id: notion_raw_api_request
    kind: lua
    description: >
      Call a Notion REST API endpoint through BeaverKi's configured Notion integration.
      Use this for current Notion endpoints that do not yet have a dedicated helper, such as views,
      file uploads, markdown page content, block updates, page move/trash, data source queries,
      or comment update/delete. The path must be relative to /v1.
    source_path: notion_raw_api_request.lua
    input_schema:
      type: object
      properties:
        method:
          type: string
          enum: [GET, POST, PATCH, DELETE]
        path:
          type: string
        body_json:
          type: [string, "null"]
      required: [method, path, body_json]
      additionalProperties: false
    output_schema:
      type: object
      additionalProperties: true
    capability_profile:
      allowed_tools: [notion_api_request]
  - tool_id: notion_comment
    kind: lua
    description: Leave a comment on a Notion page or block.
    source_path: notion_comment.lua
    input_schema:
      type: object
      properties:
        parent_kind:
          type: string
          enum: [page, block]
        parent_ref:
          type: string
        content:
          type: string
      required: [parent_kind, parent_ref, content]
      additionalProperties: false
    output_schema:
      type: object
      additionalProperties: true
    capability_profile:
      allowed_tools: [notion_create_comment]
