tools:
  - tool_id: notion_workspace_search
    kind: lua
    description: Search the configured Notion workspace for pages or data sources related to a query.
    source_path: notion_workspace_search.lua
    input_schema:
      type: object
      properties:
        query:
          type: string
        object_kind:
          type: [string, "null"]
          enum: [page, data_source, null]
        page_size:
          type: [integer, "null"]
          minimum: 1
          maximum: 100
      required: [query, object_kind, page_size]
      additionalProperties: false
    output_schema:
      type: object
      additionalProperties: true
    capability_profile:
      allowed_tools: [notion_search]
  - tool_id: notion_read_entry
    kind: lua
    description: Fetch a Notion page or data source by ID or URL, with optional page content included.
    source_path: notion_read_entry.lua
    input_schema:
      type: object
      properties:
        ref:
          type: string
        object_kind:
          type: [string, "null"]
          enum: [page, data_source, null]
        include_content:
          type: [boolean, "null"]
        page_size:
          type: [integer, "null"]
          minimum: 1
          maximum: 100
      required: [ref, object_kind, include_content, page_size]
      additionalProperties: false
    output_schema:
      type: object
      additionalProperties: true
    capability_profile:
      allowed_tools: [notion_fetch]
  - tool_id: notion_capture_note
    kind: lua
    description: >
      Create a new Notion page under a parent page or data source.
      The content field accepts Markdown-like syntax converted into native Notion blocks.
      Block types: headings (# / ## / ###), bullet lists (- or *), numbered lists (1. 2. …),
      to-do items (- [ ] / - [x]), blockquotes (>), fenced code blocks (```lang … ```),
      horizontal dividers (---).
      Nesting: indent a line by 2 spaces (or a tab) to make it a child of the preceding
      list item, quote, or paragraph — use this for sub-bullets under numbered items.
      A blank line resets the nesting context.
      Inline: **bold**, *italic*, `code`, ~~strikethrough~~, ***bold italic***,
      [link text](url), {color:text} / {color_background:text}.
    source_path: notion_capture_note.lua
    input_schema:
      type: object
      properties:
        parent_kind:
          type: string
          enum: [page, data_source]
        parent_ref:
          type: string
        title:
          type: string
        content:
          type: [string, "null"]
          description: >
            Markdown-formatted page body.
            Block types: headings (# H1, ## H2, ### H3), bullet list (- item or * item),
            numbered list (1. item), to-do (- [ ] unchecked, - [x] checked),
            blockquote (> text), fenced code block (```lang … ```), divider (---).
            Nesting: indent by 2 spaces or a tab to nest a block under the previous list item,
            quote, or paragraph. Multiple consecutive indented lines go under the same parent.
            Blank line resets nesting.
            Inline: **bold**, *italic*, `code`, ~~strikethrough~~, ***bold italic***,
            [link text](url), {color:text} (colors: gray, red, blue, green, yellow, orange,
            pink, purple, brown, default, or any with _background suffix).
      required: [parent_kind, parent_ref, title, content]
      additionalProperties: false
    output_schema:
      type: object
      additionalProperties: true
    capability_profile:
      allowed_tools: [notion_create_page]
